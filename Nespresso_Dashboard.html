<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nespresso Motion Dashboard (P08_R01)</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link rel="stylesheet" href="assets/nespresso-dashboard/css/dashboard.css" />
</head>
<body>
  <div class="page" id="appRoot">

    <section class="header">
      <div>
        <h1 class="title">Nespresso Motion Dashboard - P08_R01</h1>
        <p class="sub">Motion graph synchronized with video - nodes = actions, directed edges = transitions</p>
      </div>
      <div class="pill" id="summaryPill">Loading...</div>
    </section>

    <section class="layout">
      <article class="panel">
        <h2>
          Motion Graph
          <span class="graph-hint">
            - scroll to zoom - drag to pan
          </span>
        </h2>
        <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 8px; flex-wrap: wrap;">
          <label style="font-size: 0.9rem; font-weight: 500; color: #374151;">Detail Level:</label>
          <select id="graphModeSelect" style="padding: 6px 36px 6px 10px; border-radius: 6px; border: 1px solid #d1d5db; font-size: 0.9rem; cursor: pointer; background: white url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 fill=%22none%22 viewBox=%220 0 24 24%22 stroke=%22%236B7280%22%3E%3Cpath stroke-linecap=%22round%22 stroke-linejoin=%22round%22 stroke-width=%222%22 d=%22M19 9l-7 7-7-7%22/%3E%3C/svg%3E') no-repeat right 14px center; background-size: 16px; appearance: none; -webkit-appearance: none;">
            <option value="smart">Smart-Merged (Clear)</option>
            <option value="full">Full Raw (Complete)</option>
            <option value="abstracted">Task Phases (Overview)</option>
          </select>
        </div>
        <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 8px; flex-wrap: wrap;">
          <label style="font-size: 0.9rem; font-weight: 500; color: #374151;">Min. Transition Count:</label>
          <input type="range" id="edgeThreshold" min="1" max="10" value="1" style="width: 140px; cursor: pointer;" />
          <span id="thresholdLabel" style="font-weight: 600; min-width: 20px;">1</span>
        </div>
        <div id="graphWrap">
          <svg id="graphSvg"></svg>
          <div class="zoom-controls">
            <button id="zoomIn"    title="Zoom in">+</button>
            <button id="zoomReset" title="Fit to view">⊙</button>
            <button id="zoomOut"   title="Zoom out">−</button>
          </div>
        </div>
        <div class="legend-strip" id="legendStrip"></div>
      </article>

      <article class="panel">
        <h2>Video Player</h2>
        <video id="video" controls preload="metadata"></video>
        <div class="meta">
          <div class="row"><span>Recipe</span><span id="recipeLabel">-</span></div>
          <div class="row"><span>Video</span><span id="videoLabel">-</span></div>
          <div class="row"><span>Time</span><span id="timeLabel">0.00 s</span></div>
          <div class="row"><span>Current Action</span><span id="actionLabel">-</span></div>
          <div class="status" id="statusLabel">Status: <strong>Idle</strong></div>
        </div>
      </article>
    </section>

    <section class="footerPanel">
      <table class="timeline">
        <thead>
          <tr>
            <th>#</th><th>Action</th><th>Start</th><th>End</th><th>Duration</th>
          </tr>
        </thead>
        <tbody id="timelineBody"></tbody>
      </table>
    </section>

  </div>

  <div id="edgeTooltip" style="
    position: fixed;
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 12px;
    font-family: monospace;
    pointer-events: none;
    display: none;
    white-space: pre;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  "></div>

  <script type="module" src="assets/nespresso-dashboard/js/app.js"></script>
</body>
</html>
